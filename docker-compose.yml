services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: "jdbc:sqlite:/data/bank.db"
      SPRING_SQL_INIT_MODE: "always"
    volumes:
      - bank-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  bank-data:
